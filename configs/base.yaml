# PUMA Challenge Configuration
SEED: 42

# Data
DATA_ROOT: "./dataset_PUMA"
OUTPUT_DIR: "./outputs"
CHECKPOINT_DIR: "./checkpoints"
DATASET_NAME: "puma"

# Task
TASK: "tissue"
NUCLEI_TRACK: 1
USE_CONTEXT: false
# Split ratio: train / val / test
SPLIT_RATIO: [0.7, 0.2, 0.1]

# Model
NUM_CHANNELS: 3
NUM_CLASSES: 6
IMAGE_SIZE: [512, 512]          # Validation image size

# Patch-based training
PATCH_SIZE: 512                  # Random crop size during training
PATCHES_PER_IMAGE: 4            # 8 ROIs x 4 patches = 32 samples/epoch

# Encoder (ResNet + SE)
ENCODER_CHANNELS: [64, 128, 256, 512]
BLOCKS_PER_STAGE: 2
USE_SE: true

# Bottleneck
BOTTLENECK_CHANNELS: 1024
BOTTLENECK_TYPE: "standard"      # 'standard' or 'mamba'

# Decoder
USE_ATTENTION_GATES: true

# Training
BATCH_SIZE: 8
NUM_EPOCHS: 300
LEARNING_RATE: 1.0e-3
WEIGHT_DECAY: 1.0e-4
DROPOUT: 0.1

# DataLoader
NUM_WORKERS: 4
PIN_MEMORY: true

# Stability
GRAD_CLIP_NORM: 1.0
USE_AMP: false

# Loss weights
DICE_WEIGHT: 0.5
CE_WEIGHT: 0.3
FOCAL_WEIGHT: 0.5
FP_PENALTY_WEIGHT: 0.2
BOUNDARY_WEIGHT: 0.1
CLUSTER_WEIGHT: 0.1

# W&B
USE_WANDB: true
WANDB_PROJECT: "PUMA-"
WANDB_ENTITY: null
WANDB_MODE: "online"

# Scheduler
SCHEDULER_T0: 10
SCHEDULER_T_MULT: 2
SCHEDULER_ETA_MIN: 1.0e-6

# Early stopping
EARLY_STOPPING_PATIENCE: 50

# Augmentation
USE_AUGMENTATION: true

# Stain normalization (Macenko) - normalizes H&E color variation across slides
USE_STAIN_NORM: true
